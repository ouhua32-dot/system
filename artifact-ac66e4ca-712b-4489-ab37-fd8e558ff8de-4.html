                        <html lang="en">
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0">

								body {
									background-color: white; /* Ensure the iframe has a white background */
								}

								
							</style>

                        <body>
                            <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营数据清洗工具 v3.1</title>
    <style>
        :root {
            --bg:#0a0e17;--card:#111827;--border:#1e293b;--accent:#3b82f6;
            --accent2:#8b5cf6;--accent3:#06b6d4;--success:#10b981;
            --warning:#f59e0b;--danger:#ef4444;--text:#e2e8f0;
            --text2:#94a3b8;--text3:#64748b;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .header{background:linear-gradient(135deg,rgba(59,130,246,.1),rgba(139,92,246,.1));border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
        .header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-badges{display:flex;gap:12px}
        .badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
        .badge-blue{background:rgba(59,130,246,.15);color:var(--accent)}
        .badge-green{background:rgba(16,185,129,.15);color:var(--success)}
        .badge-purple{background:rgba(139,92,246,.15);color:var(--accent2)}
        .container{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 57px)}
        .sidebar{background:var(--card);border-right:1px solid var(--border);padding:16px;overflow-y:auto}
        .sidebar-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin:16px 0 8px 4px}
        .sidebar-title:first-child{margin-top:0}
        .nav-item{padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:4px;border:1px solid transparent}
        .nav-item:hover{background:rgba(255,255,255,.03)}
        .nav-item.active{background:rgba(59,130,246,.08);border-color:var(--accent)}
        .nav-item .name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
        .nav-item .desc{font-size:11px;color:var(--text3);margin-top:2px}
        .nav-item .status{width:7px;height:7px;border-radius:50%;display:inline-block;margin-left:auto}
        .nav-item .status.on{background:var(--success)}
        .nav-item .status.off{background:var(--text3)}
        .main{padding:24px 32px;overflow-y:auto}
        .upload-zone{border:2px dashed var(--border);border-radius:16px;padding:40px;text-align:center;transition:all .3s;background:rgba(255,255,255,.01);margin-bottom:24px}
        .upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(59,130,246,.05)}
        .upload-zone .icon{font-size:40px;margin-bottom:12px}
        .upload-zone h3{font-size:15px;margin-bottom:6px}
        .upload-zone p{font-size:12px;color:var(--text3)}
        .upload-zone input{display:none}
        .btn{padding:9px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(59,130,246,.3)}
        .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-success{background:var(--success);color:#fff}
        .btn-success:hover{opacity:.9}
        .btn-success:disabled{opacity:.5;cursor:not-allowed}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
        .btn-outline:hover{border-color:var(--accent)}
        .btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
        .panel{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
        .panel-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.02)}
        .panel-head h3{font-size:14px;font-weight:600}
        .panel-body{padding:16px 18px}
        .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
        .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
        .stat .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
        .stat .val{font-size:24px;font-weight:700;margin-top:2px}
        .stat .val.blue{color:var(--accent)}.stat .val.green{color:var(--success)}.stat .val.purple{color:var(--accent2)}.stat .val.cyan{color:var(--accent3)}.stat .val.yellow{color:var(--warning)}
        .tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px}
        table.dt{width:100%;border-collapse:collapse;font-size:12px}
        table.dt th{padding:9px 10px;background:rgba(59,130,246,.08);text-align:left;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}
        table.dt td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.03);white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
        table.dt tr:hover td{background:rgba(255,255,255,.03)}
        .sku{font-family:'SF Mono',monospace;color:var(--accent3);font-size:12px}
        .chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px}
        .chip-blue{background:rgba(59,130,246,.12);color:var(--accent)}
        .chip-green{background:rgba(16,185,129,.12);color:var(--success)}
        .chip-yellow{background:rgba(245,158,11,.12);color:var(--warning)}
        .chip-red{background:rgba(239,68,68,.12);color:var(--danger)}
        .chip-purple{background:rgba(139,92,246,.12);color:var(--accent2)}
        .chip-cyan{background:rgba(6,182,212,.12);color:var(--accent3)}
        .log-box{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:14px;max-height:260px;overflow-y:auto;font-family:'SF Mono',monospace;font-size:11px;line-height:1.8}
        .log-box .t{color:var(--text3)}.log-box .info{color:var(--accent3)}.log-box .ok{color:var(--success)}.log-box .warn{color:var(--warning)}.log-box .err{color:var(--danger)}
        .empty{text-align:center;padding:50px 20px;color:var(--text3)}
        .empty .icon{font-size:56px;margin-bottom:12px;opacity:.3}
        .section-title{font-size:17px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .toast{position:fixed;top:80px;right:32px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;animation:fadeIn .3s;display:none}
        .toast.show{display:block}
        .toast-success{background:rgba(16,185,129,.9);color:#fff}
        .toast-error{background:rgba(239,68,68,.9);color:#fff}
        .toast-info{background:rgba(59,130,246,.9);color:#fff}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        @media(max-width:860px){.container{grid-template-columns:1fr}.sidebar{display:none}}
    </style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="header">
    <h1>📊 运营数据清洗工具 v3.1</h1>
    <div class="header-badges">
        <span class="badge badge-blue" id="hFiles">0 文件</span>
        <span class="badge badge-green" id="hRows">0 行</span>
        <span class="badge badge-purple" id="hSKUs">0 SKU</span>
    </div>
</div>
<div class="container">
    <div class="sidebar">
        <div class="sidebar-title">数据源</div>
        <div id="navSources"></div>
        <div class="sidebar-title">工具</div>
        <div class="nav-item" onclick="showTab('rules')"><div class="name">⚙️ 清洗规则</div><div class="desc">6个数据源字段规则</div></div>
        <div class="nav-item" onclick="showTab('skuaudit')"><div class="name">🔍 SKU归一化审计</div><div class="desc">JP/JP1/JP2 → JP</div></div>
        <div class="sidebar-title">输出</div>
        <div class="nav-item" onclick="showTab('export')"><div class="name">📥 批量导出</div><div class="desc">下载所有清洗结果</div></div>
    </div>
    <div class="main">
        <div class="upload-zone" id="uploadZone">
            <div class="icon">📁</div>
            <h3>拖放文件或点击上传</h3>
            <p>支持 .xlsx .xls .csv — 可同时上传多个文件</p>
            <input type="file" id="fileInput" multiple accept=".xlsx,.xls,.csv">
            <br><br>
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择文件</button>
            <button class="btn btn-outline" onclick="loadDemo()" style="margin-left:8px">加载示例数据</button>
        </div>
        <div id="tabContent">
            <div class="empty"><div class="icon">📊</div><h3>上传数据文件开始清洗</h3><p style="margin-top:6px">或点击"加载示例数据"查看效果</p></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* ============================================================
   v3.1 — 修复导出功能：严格空行过滤 + 错误捕获 + 进度提示
   ============================================================ */

const SOURCE_DETECT = {
    '待发货':{kw:['待发货'],cols:['Committed (not editable)']},
    '待分货':{kw:['待分货'],cols:[]},
    '仓库库存':{kw:['逻辑仓','库存'],cols:['可用量']},
    '头程明细':{kw:['头程'],cols:['发货单号']},
    '销量数据':{kw:['销量数据'],cols:['净售出商品数']},
    '销量预测':{kw:['销量预测','预测'],cols:[]}
};

const SKU_ALIAS = {
    'PF002-A-JP':['PF002-A-JP2'],'PF002-A+SA005-JP':['PF002-A+SA005-JP2'],
    'PF002-M+SA005-JP':['PF002-M+SA005-JP2'],'PF003-D+SA007-JP':['PF003-D+SA007-JP1'],
    'PF003-D-JP':['PF003-D-JP1'],'PF003-S+SA007-JP':['PF003-S+SA007-JP1'],
    'PF003-S-JP':['PF003-S-JP1'],'PF003-M+SA007-JP':['PF003-M+SA007-JP1'],
    'PF003-M-JP':['PF003-M-JP1'],'PF003-C+SA007-JP':['PF003-C+SA007-JP1'],
    'PF003-C-JP':['PF003-C-JP1'],'PF003-E+SA007-JP':['PF003-E+SA007-JP1'],
    'PF003-E-JP':['PF003-E-JP1'],'PF004-U+SA007-JP':['PF004-U+SA007-JP1'],
    'PF004-U-JP':['PF004-U-JP1'],'PF001-S-JP':['PF001-S-JP1'],
    'PF001-U-JP':['PF001-U-JP1'],'PF001-U+SA001-JP':['PF001-U+SA001-JP1'],
    'PF001-P-JP':['PF001-P-JP1'],'PF001-P+SA001-JP':['PF001-P+SA001-JP1'],
    'PF001-E+SA001-JP':['PF001-E+SA001-JP1']
};

let dataSources={},cleanedData={},logs=[],skuLog=[],activeTab='';

// ---- Toast 提示 ----
function showToast(msg, type='info', duration=3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show toast-${type}`;
    clearTimeout(t._timer);
    t._timer = setTimeout(()=>{ t.className='toast'; }, duration);
}

// ---- SKU 归一化 ----
function normSKU(sku,src){
    if(!sku) return '';
    let s=String(sku).trim().toUpperCase();
    if(!s||s==='UNDEFINED'||s==='NAN'||s==='NULL') return '';
    for(const[std,aliases]of Object.entries(SKU_ALIAS)){
        if(aliases.map(a=>a.toUpperCase()).includes(s)){
            skuLog.push({from:sku,to:std.toUpperCase(),method:'精确映射',src});
            return std.toUpperCase();
        }
        if(s===std.toUpperCase()) return s;
    }
    const re=/-JP(\d+)$/i;
    if(re.test(s)){
        const n=s.replace(re,'-JP');
        skuLog.push({from:sku,to:n,method:'正则兜底',src});
        return n;
    }
    return s;
}

// ---- 工具函数 ----
function toNum(v){if(v==null||v==='')return 0;if(typeof v==='number')return v;return Number(String(v).replace(/[¥$€,，\s]/g,''))||0}
function toDate(v){
    if(!v||v==='')return '';
    let s=String(v).trim();
    if(s.includes('1901'))s=s.replace(/1901/g,'2026');
    if(/^\d{5}$/.test(s)){const d=new Date((Number(s)-25569)*864e5);return fmtD(d)}
    // 处理带时间戳的日期 "2026-03-16 00:00:00"
    s = s.replace(/\s+\d{2}:\d{2}:\d{2}.*$/,'');
    const d=new Date(s);
    return(!isNaN(d)&&d.getFullYear()>1950)?fmtD(d):s;
}
function fmtD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addLog(msg,lv='info'){logs.push({t:new Date().toLocaleTimeString(),msg,lv})}

// ---- 严格判断空行 ----
function isEmptyRow(row){
    return Object.values(row).every(v => v===''||v===null||v===undefined);
}

// ---- 文件读取 ----
const uz=document.getElementById('uploadZone'),fi=document.getElementById('fileInput');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('dragover')});
uz.addEventListener('dragleave',()=>uz.classList.remove('dragover'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('dragover');handleFiles(e.dataTransfer.files)});
fi.addEventListener('change',e=>handleFiles(e.target.files));

async function handleFiles(files){
    for(const f of files){
        try{
            addLog(`📂 读取: ${f.name}`);
            const d=await readFile(f);
            const type=detectType(f.name,d.headers);
            dataSources[f.name]={name:f.name,type,headers:d.headers,rows:d.rows};
            addLog(`✅ ${f.name} → [${type}] ${d.rows.length}行`,'ok');
            cleanSource(f.name);
        }catch(e){addLog(`❌ ${f.name}: ${e.message}`,'err');showToast(`读取失败: ${f.name}`,'error')}
    }
    refreshUI();
}

function readFile(file){
    return new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=e=>{
            try{
                const ext=file.name.split('.').pop().toLowerCase();
                const wb=ext==='csv'?XLSX.read(e.target.result,{type:'binary',codepage:65001}):XLSX.read(e.target.result,{type:'array'});
                let rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
                // ★ 读取时就过滤完全空行
                const before = rows.length;
                rows = rows.filter(r => !isEmptyRow(r));
                const removed = before - rows.length;
                if(removed > 0) addLog(`🗑️ ${file.name}: 读取时移除 ${removed} 空行`, 'warn');
                res({headers:rows.length?Object.keys(rows[0]):[],rows});
            }catch(e){rej(e)}
        };
        file.name.endsWith('.csv')?r.readAsBinaryString(file):r.readAsArrayBuffer(file);
    });
}

function detectType(name,headers){
    for(const[type,rule]of Object.entries(SOURCE_DETECT)){
        if(rule.kw.some(k=>name.includes(k)))return type;
        if(rule.cols.length&&rule.cols.every(c=>headers.includes(c)))return type;
    }
    return '未识别';
}

/* ============================================================
   核心清洗：每个数据源只提取用户定义的核心字段
   ============================================================ */
function cleanSource(fn){
    const src=dataSources[fn];
    if(!src)return;
    let result=[];
    const t=src.type;

    try{
        switch(t){
            case '待发货':{
                const map={};
                src.rows.forEach(r=>{
                    const sku=normSKU(r['SKU'],fn);
                    if(!sku)return;
                    const qty=toNum(r['Committed (not editable)']);
                    map[sku]=(map[sku]||0)+qty;
                });
                result=Object.entries(map).map(([sku,qty])=>({SKU:sku,CommittedQty:qty}));
                addLog(`🛒 ${fn}: ${result.length} SKU待发货汇总`,'ok');
                break;
            }
            case '待分货':{
                const skuCol=src.headers.find(h=>h.toUpperCase()==='SKU')||src.headers[0];
                const weekCols=src.headers.filter(h=>h!==skuCol&&(/\d{4}/.test(h)||/^\d{5}$/.test(h)));
                src.rows.forEach(r=>{
                    const sku=normSKU(r[skuCol],fn);
                    if(!sku)return;
                    weekCols.forEach(w=>{
                        const qty=toNum(r[w]);
                        result.push({SKU:sku,WeekStart:toDate(w),AllocationQty:qty});
                    });
                });
                addLog(`📦 ${fn}: ${result.length} 行分货数据`,'ok');
                break;
            }
            case '仓库库存':{
                const map={};
                src.rows.forEach(r=>{
                    const sku=normSKU(r['SKU'],fn);
                    if(!sku)return;
                    const qty=toNum(r['可用量']);
                    map[sku]=(map[sku]||0)+qty;
                });
                result=Object.entries(map).map(([sku,qty])=>({SKU:sku,AvailableQty:qty}));
                addLog(`🏭 ${fn}: ${result.length} SKU库存汇总`,'ok');
                break;
            }
            case '头程明细':{
                src.rows.forEach(r=>{
                    const sku=normSKU(r['SKU'],fn);
                    if(!sku)return;
                    result.push({
                        ShipmentID:r['发货单号']||'',
                        PickupDate:toDate(r['提货日期']),
                        ETA:toDate(r['到港时间ETA']),
                        CargoType:r['货物类型']||'',
                        SKU:sku,
                        Quantity:toNum(r['数量']),
                        ShelvingDate:toDate(r['上架日期']),
                        DeliveryDate:toDate(r['妥投日期'])
                    });
                });
                addLog(`🚢 ${fn}: ${result.length} 条头程记录`,'ok');
                break;
            }
            case '销量数据':{
                src.rows.forEach(r=>{
                    const sku=normSKU(r['SKU'],fn);
                    if(!sku)return;
                    const date=toDate(r['天']);
                    const qty=toNum(r['净售出商品数']);
                    if(!date)return;
                    result.push({SKU:sku,Date:date,NetUnitsSold:qty});
                });
                addLog(`📈 ${fn}: ${result.length} 条有效销量(空行已过滤)`,'ok');
                break;
            }
            case '销量预测':{
                const skuCol=src.headers.find(h=>h.toUpperCase()==='SKU')||src.headers[0];
                const weekCols=src.headers.filter(h=>/^W\d+$/i.test(h));
                const dateCols=weekCols.length?[]:src.headers.filter(h=>h!==skuCol&&(/\d{4}/.test(h)||/^\d{5}$/.test(h)));
                const cols=weekCols.length?weekCols:dateCols;
                src.rows.forEach(r=>{
                    const sku=normSKU(r[skuCol],fn);
                    if(!sku)return;
                    cols.forEach(w=>{
                        const qty=toNum(r[w]);
                        result.push({SKU:sku,Week:w,ForecastQty:qty});
                    });
                });
                addLog(`🔮 ${fn}: ${result.length} 行预测数据`,'ok');
                break;
            }
            default:
                addLog(`⚠️ ${fn}: 未识别类型`,'warn');
                result=src.rows;
        }
    }catch(err){
        addLog(`❌ 清洗 ${fn} 出错: ${err.message}`,'err');
        showToast(`清洗出错: ${fn}`,'error');
        result=[];
    }

    const fields=result.length?Object.keys(result[0]):[];
    cleanedData[fn]={type:t,rows:result,fields};
    addLog(`✅ ${fn}: 输出 ${result.length} 行 × ${fields.length} 字段`,'ok');
}

/* ============================================================
   UI
   ============================================================ */
function refreshUI(){
    const nav=document.getElementById('navSources');
    nav.innerHTML='';
    const icons={'待发货':'🛒','待分货':'📦','仓库库存':'🏭','头程明细':'🚢','销量数据':'📈','销量预测':'🔮'};
    for(const[fn,s]of Object.entries(dataSources)){
        const c=cleanedData[fn];
        const div=document.createElement('div');
        div.className=`nav-item ${activeTab===fn?'active':''}`;
        div.onclick=()=>showSource(fn);
        div.innerHTML=`<div class="name">${icons[s.type]||'📄'} ${s.type} <span class="status ${c?'on':'off'}"></span></div><div class="desc">${fn} · ${c?c.rows.length+'行':'待处理'}</div>`;
        nav.appendChild(div);
    }
    const nf=Object.keys(dataSources).length;
    const nr=Object.values(cleanedData).reduce((s,d)=>s+d.rows.length,0);
    const skus=new Set();
    Object.values(cleanedData).forEach(d=>d.rows.forEach(r=>{if(r.SKU)skus.add(r.SKU)}));
    document.getElementById('hFiles').textContent=nf+' 文件';
    document.getElementById('hRows').textContent=nr+' 行';
    document.getElementById('hSKUs').textContent=skus.size+' SKU';
}

function showSource(fn){
    activeTab=fn;refreshUI();
    const s=dataSources[fn],c=cleanedData[fn];
    if(!s)return;
    const skus=c?new Set(c.rows.map(r=>r.SKU).filter(Boolean)).size:0;

function showTab(tab){
    activeTab=tab;refreshUI();

    if(tab==='rules')renderRules(el);

function renderTbl(rows,fields){
    if(!rows.length)return'<div class="empty">无数据</div>';
    const fs=fields||Object.keys(rows[0]);
    let h='<div class="tbl-wrap" style="max-height:420px;overflow:auto"><table class="dt"><thead><tr><th>#</th>';
    fs.forEach(f=>{h+=`<th>${f}</th>`});
    h+='</tr></thead><tbody>';
    rows.forEach((r,i)=>{
        h+=`<tr><td style="color:var(--text3)">${i+1}</td>`;
        fs.forEach(f=>{let v=r[f]!=null?r[f]:'';if(f==='SKU')v=`<span class="sku">${v}</span>`;h+=`<td>${v}</td>`});
        h+='</tr>';
    });
    h+='</tbody></table></div>';
    h+=`<p style="margin-top:6px;font-size:11px;color:var(--text3)">前${Math.min(rows.length,50)}行 / 共${rows.length}行</p>`;
    return h;
}

function renderAudit(el){
    let h=`<div class="section-title">🔍 SKU 归一化审计 <span class="badge badge-green">${skuLog.length} 条转换</span></div>`;
    if(!skuLog.length){h+='<div class="empty"><div class="icon">📋</div><h3>暂无归一化记录</h3></div>';el.innerHTML=h;return}
    const agg={};
    skuLog.forEach(l=>{const k=l.from+'→'+l.to;if(!agg[k])agg[k]={...l,count:0,sources:new Set()};agg[k].count++;agg[k].sources.add(l.src)});
    const list=Object.values(agg).sort((a,b)=>b.count-a.count);
    h+='<div class="tbl-wrap"><table class="dt"><thead><tr><th>原始SKU</th><th></th><th>归一化后</th><th>方式</th><th>次数</th><th>来源</th></tr></thead><tbody>';
    list.forEach(i=>{h+=`<tr><td><span class="chip chip-red">${i.from}</span></td><td style="color:var(--text3)">→</td><td><span class="sku">${i.to}</span></td><td><span class="chip ${i.method==='精确映射'?'chip-yellow':'chip-purple'}">${i.method}</span></td><td><strong>${i.count}</strong></td><td style="font-size:10px;color:var(--text3)">${[...i.sources].join(', ')}</td></tr>`});
    h+='</tbody></table></div>';
    el.innerHTML=h;
}

/* ============================================================
   ★ 修复后的导出功能
   ============================================================ */
function exportOne(fn){
    const d=cleanedData[fn];
    if(!d||!d.rows.length){showToast('无数据可导出','error');return}
    try{
        showToast(`正在导出 ${d.type}...`,'info');
        const ws=XLSX.utils.json_to_sheet(d.rows);
        const wb=XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,ws,d.type.substring(0,31));
        XLSX.writeFile(wb,`cleaned_${d.type}_${Date.now()}.xlsx`);
        showToast(`✅ ${d.type} 导出成功！${d.rows.length} 行`,'success');
        addLog(`📥 已导出: ${d.type} (${d.rows.length}行)`,'ok');
    }catch(err){
        showToast(`❌ 导出失败: ${err.message}`,'error');
        addLog(`❌ 导出 ${fn} 失败: ${err.message}`,'err');
    }
}

function exportAll(){
    const entries=Object.entries(cleanedData).filter(([,d])=>d.rows.length>0);
    if(!entries.length){showToast('无数据可导出','error');return}

    const btn=document.getElementById('btnExportAll');
    if(btn){btn.disabled=true;btn.textContent='⏳ 导出中...';}

    // 使用 setTimeout 让 UI 先更新
    setTimeout(()=>{
        try{
            showToast(`正在生成 ${entries.length} 个Sheet...`,'info');
            const wb=XLSX.utils.book_new();
            let totalRows=0;
            const usedNames=new Set();

            entries.forEach(([fn,d])=>{
                // 确保 sheet 名不重复且不超过 31 字符
                let name=d.type.substring(0,31);
                let suffix=1;
                while(usedNames.has(name)){
                    name=d.type.substring(0,28)+'_'+suffix;
                    suffix++;
                }
                usedNames.add(name);

                const ws=XLSX.utils.json_to_sheet(d.rows);
                XLSX.utils.book_append_sheet(wb,ws,name);
                totalRows+=d.rows.length;
            });

            XLSX.writeFile(wb,`all_cleaned_${Date.now()}.xlsx`);
            showToast(`✅ 导出成功！${entries.length} 个表 / ${totalRows} 行`,'success',4000);
            addLog(`📦 已导出全部 ${entries.length} 个数据源 (${totalRows}行)`,'ok');
        }catch(err){
            showToast(`❌ 导出失败: ${err.message}`,'error',5000);
            addLog(`❌ 批量导出失败: ${err.message}`,'err');
            console.error('Export error:',err);
        }finally{
            if(btn){btn.disabled=false;btn.textContent='📦 一键导出所有（多Sheet Excel）';}
        }
    }, 100);
}

function exportSeparate(){
    const entries=Object.entries(cleanedData).filter(([,d])=>d.rows.length>0);
    if(!entries.length){showToast('无数据可导出','error');return}
    let count=0;
    entries.forEach(([fn,d])=>{
        try{
            const ws=XLSX.utils.json_to_sheet(d.rows);
            const wb=XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb,ws,d.type.substring(0,31));
            XLSX.writeFile(wb,`cleaned_${d.type}_${Date.now()}.xlsx`);
            count++;
        }catch(e){addLog(`❌ 导出 ${d.type} 失败: ${e.message}`,'err')}
    });
    showToast(`✅ 分文件导出完成：${count} 个文件`,'success');
}

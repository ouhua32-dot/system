<script>
var DATA = [{"week": "W11", "region": "US", "comment_en": "Time for response", "id": 1, "comment_zh": "\u56de\u590d\u65f6\u95f4", "label": "\u5176\u4ed6"}, {"week": "W11", "region": "US", "comment_en": "Nothing, I will not buy anything more from Bambu, understand i own 10 machines including H2Cs and x1cs and p2s and A1s and I have over 10,000 dollars in Bambu products, and you guys made me feel like I was trying to steal nozzles, worth 120.00 dollars, NO THANKS!", "id": 2, "comment_zh": "\u6ca1\u4ec0\u4e48\uff0c\u6211\u4e0d\u4f1a\u518d\u4ece Bambu \u8d2d\u4e70\u4efb\u4f55\u4e1c\u897f\uff0c\u6211\u77e5\u9053\u6211\u62e5\u6709 10 \u53f0\u673a\u5668\uff0c\u5305\u62ec H2Cs\u3001x1cs\u3001p2s \u548c A1s\uff0c\u800c\u4e14\u6211\u6709\u8d85\u8fc7 10,000 \u7f8e\u5143\u7684 Bambu \u4ea7\u54c1\uff0c\u4f60\u4eec\u8ba9\u6211\u89c9\u5f97\u6211\u60f3\u5077\u55b7\u5634\uff0c\u4ef7\u503c 120.00 \u7f8e\u5143\uff0c\u4e0d\uff0c\u8c22\u8c22\uff01", "label": "\u5176\u4ed6"}, {"week": "W11", "region": "US", "comment_en": "Shipping services seemed to have changed since I last ordered. It used to be smooth and received quickly without issue. The current shipping is unreliable and has forced me to find another 3d printing solution / suppliers.", "id": 3, "comment_zh": "\u81ea\u4ece\u6211\u4e0a\u6b21\u8ba2\u8d2d\u4ee5\u6765\uff0c\u8fd0\u8f93\u670d\u52a1\u4f3c\u4e4e\u53d1\u751f\u4e86\u53d8\u5316\u3002\u4ee5\u524d\u5f88\u987a\u5229\uff0c\u5f88\u5feb\u5c31\u6536\u5230\u4e86\uff0c\u6ca1\u6709\u4efb\u4f55\u95ee\u9898\u3002\u76ee\u524d\u7684\u8fd0\u8f93\u4e0d\u53ef\u9760\uff0c\u8feb\u4f7f\u6211\u5bfb\u627e\u53e6\u4e00\u4e2a 3D \u6253\u5370\u89e3\u51b3\u65b9\u6848/\u4f9b\u5e94\u5546\u3002", "label": "\u5176\u4ed6"}, {"week": "W11", "region": "US", "comment_en": "I don't think my situation was adequately resolved. I understand companies have policies but sometimes looking at the situation they should be able to make decisions that make sense. My situation was based on one simple roll of filament. Bu  "This is my second negative experience with Bambu Lab. Nearly every contact I made had to be re-stated, despite having specific information and requests within my email. I was also told that my tax for a non-profit educational entity did display at check-out, when it did not (I have the checkout PDF), which is the reason I created a B2B account afterwards. Finally, once a B2B account was created, I was still told tax could not be refunded. Our school district will no longer do business with you.", "id": 103, "comment_zh": "\u8fd9\u662f\u6211\u5bf9 Bambu Lab \u7684\u7b2c\u4e8c\u6b21\u8d1f\u9762\u7ecf\u5386\u3002\u5c3d\u7ba1\u6211\u7684\u7535\u5b50\u90ae\u4ef6\u4e2d\u6709\u5177\u4f53\u7684\u4fe1\u606f\u548c\u8bf7\u6c42\uff0c\u4f46\u51e0\u4e4e\u6211\u6240\u505a\u7684\u6bcf\u4e00\u6b21\u8054\u7cfb\u90fd\u5fc5\u987b\u91cd\u65b0\u8bf4\u660e\u3002\u6211\u8fd8\u88ab\u544a\u77e5\uff0c\u6211\u4e3a\u975e\u8425\u5229\u6559\u80b2\u5b9e\u4f53\u7f34\u7eb3\u7684\u7a0e\u6b3e\u786e\u5b9e\u5728\u7ed3\u5e10\u65f6\u663e\u793a\uff0c\u4f46\u5b9e\u9645\u4e0a\u5e76\u6ca1\u6709\u663e\u793a\uff08\u6211\u6709\u7ed3\u5e10 PDF\uff09\uff0c\u8fd9\u5c31\u662f\u6211\u540e\u6765\u521b\u5efa B2B \u5e10\u6237\u7684\u539f\u56e0\u3002\u6700\u540e\uff0c\u521b\u5efaB2B\u8d26\u6237\u540e\uff0c\u6211\u4ecd\u7136\u88ab\u544a\u77e5\u7a0e\u6b3e\u65e0\u6cd5\u9000\u8fd8\u3002\u6211\u4eec\u5b66\u533a\u5c06\u4e0d\u518d\u4e0e\u60a8\u505a\u751f\u610f\u3002", "label": "\u9000\u6b3e/\u9000\u8d27\u969c\u788d"}, {"week": "W10", "region": "EU", "comment_en": "I'm upset, i want my bill with vat number", "id": 104, "comment_zh": "\u6211\u5f88\u4e0d\u9ad8\u5174\uff0c\u6211\u60f3\u8981\u5e26\u6709\u589e\u503c\u7a0e\u53f7\u7684\u8d26\u5355", "label": "\u7269\u6d41\u4f9b\u5e94\u5546\u670d\u52a1\u5dee"}, {"week": "W10", "region": "UK", "comment_en": "broke and was hard to get returmn and refund", "id": 105, "comment_zh": "\u574f\u4e86\uff0c\u5f88\u96be\u83b7\u5f97\u9000\u8d27\u548c\u9000\u6b3e", "label": "\u9000\u6b3e/\u9000\u8 8ab\u652f\u6301\u4eba\u5458\u89e3\u51b3\u4e86\u4e00\u6837\u3002", "label": "\u7f51\u7ad9\u4fe1\u606f\u6df7\u4e71"}, {"week": "W10", "region": "EU", "comment_en": "My problem wouldn't have been resolved if I hadn't personally contacted them via chat after seeing for days that the package was waiting for collection by the courier. The delay caused me a problem with a customer of mine, to whom I couldn't present a very important prototype.", "id": 109, "comment_zh": "\u5982\u679c\u6211\u6ca1\u6709\u5728\u770b\u5230\u5305\u88f9\u7b49\u5f85\u5feb\u9012\u5458\u9886\u53d6\u51e0\u5929\u540e\u4eb2\u81ea\u901a\u8fc7\u804a\u5929\u8054\u7cfb\u4ed6\u4eec\uff0c\u6211\u7684\u95ee\u9898\u5c31\u4e0d\u4f1a\u5f97\u5230\u89e3\u51b3\u3002\u8fd9\u6b21\u5ef6\u8bef\u7ed9\u6211\u7684\u4e00\u4f4d\u5ba2\u6237\u5e26\u6765\u4e86\u95ee\u9898\uff0c\u6211\u65e0\u6cd5\u5411\u4ed6\u5c55\u793a\u975e\u5e38\u91cd\u8981\u7684\u539f\u578b\u3002", "label": "\u7269\u6d41\u4f9b\u5e94\u5546\u670d\u52a1\u5dee"}, {"week": "W10", "region": "US", "comment_en": "Terrible support and you don't stand behind your product. Time to find a different company that actually cares about their customers and stands behind their product. Seems like bambu is Chinese junk these days.", "id": 110, "comment_zh": "\u7cdf\u7cd5\u7684\u652f\u6301\uff0c\u4f60\u4e0d\u652f\u6301\u4f60\u7684\u4ea7\u54c1\u3002\u662f\u65f6\u5019\u5bfb\u627e\u4e00\u5bb6\u771f\u6b63\u5173\u5fc3\u5ba2\u6237\u5e76\u652f\u6301\u5176\u4ea7\u54c1\u7684\u4e0d\u540c\u516c\u53f8\u4e86\u3002\u770b\u6765\u73b0\u5728\u7684\u7af9\u5b50\u662f\u4e2d\u56fd\u7684\u5783\u573e\u4e86\u3002", "label": "\u5176\u4ed6"}, {"week": "W10", "region": "US", "comment_en": "Unreliable", "id": 111, "comment_zh": "\u4e0d\u53ef\u9760", "label": "\u5176\u4ed6"}, {"week": "W10", "region": "US", "comment_en": "I don't know who y'all gave my printer to but this is insane as I saved up forever to be able to afford buy an H2D all to have it given to wrong person", "id": 112, "comment_zh": "\u6211\u4e0d\u77e5\u9053\u4f60\u4eec\u628a\u6211\u7684\u6253\u5370\u673a\u7ed9\u4e86\u8c01\uff0c\u4f46\u8fd9\u592a\u75af\u72c2\u4e86\uff0c\u56e0\u4e3a\u6211\u6512\u4e86\u4e00\u8f88\u5b50\u94b1\u624d\u4e70\u5f97\u8d77\u4e00\u53f0 H2D\uff0c\u7ed3\u679c\u5374\u628a\u5b83\u9001\u7ed9\u4e86\u9519\u8bef\u7684\u4eba", "label": "\u5305\u88f9\u88ab\u8bef\u9001"}, {"week": "W10", "region": "EU", "comment_en": "The didnt help me", "id": 113, "comment_zh": "\u6ca1\u6709\u5e2e\u52a9\u6211", "label": "\u5176\u4ed6"}, {"week": "W10", "region": "EU", "comment_en": "Hice mi pedido el d\u00eda 22 de febrero, me e ten\u00eda que haber llegado el d\u00eda 3, estamos a d\u00eda 6 y no me ha llegado nada.", "id": 114, "comment_zh": "\u62112\u670822\u53f7\u4e0b\u7684\u5355\uff0c\u5e94\u8be53\u53f7\u5c31\u5230\u4e86\uff0c\u73b0\u57286\u53f7\u4e86\uff0c\u4ec0\u4e48\u4e5f\u6ca1\u6709\u5230\u3002", "label": "\u5176\u4ed6"}, {"week": "W10", "region": "EU", "comment_en": "Bl is not a useful Equipment Supplier for commercial production.", "id": 115, "comment_zh": "Bl \u4e0d\u662f\u5546\u4e1a\u751f\u4ea7\u4e2d\u6709\u7528\u7684\u8bbe\u5907\u4f9b\u5e94\u5546\u3002", "label": "\u4f01\u4e1a\u5ba2\u6237\u4f53\u9a8c\u4e0d\u4f73"}, {"week": "W10", "region": "US", "comment_en": "The printer is a good printer, but with very limited usage, my H2D has had major problems. The support takes too long. With shipping errors and long waits for simple responses, it has taken me over 2 months to get my printer up and running. I am impressed with the printer. Please look at your customer support and make the necessary changes. I would recommend Bambu. At this point, I am looking for a different printer for backup and/or replacement, because the support is inadequate.", "id": 116, "comment_zh": "\u8be5\u6253\u5370\u673a\u662f\u4e00\u53f0\u5f88\u597d\u7684\u6253\u5370\u673a\uff0c\u4f46\u7531\u4e8e\u4f7f\u7528\u975e\u5e38\u6709\u9650\uff0c\u6211\u7684 H2D \u51fa\u73b0\u4e86\u91cd\u5927\u95ee\u9898\u3002\u652f\u6301\u65f6\u95f4\u592a\u957f\u3002\u7531\u4e8e\u8fd0\u8f93\u9519\u8bef\u548c\u7b80\u5355\u56de\u590d\u7684\u6f2b\u957f\u7b49\u5f85\uff0c\u6211\u82b1\u4e86\u4e24\u4e2a\u591a\u6708\u7684\u65f6\u95f4\u624d\u8ba9\u6211\u7684\u6253\u5370\u673a\u542f\u52a8\u5e76\u8fd0\u884c\u3002\u6253\u5370\u673a\u7ed9\u6211\u7559\u4e0b\u4e86\u6df1\u523b\u7684\u5370\u8c61\u3002\u8bf7\u67e5\u770b\u60a8\u7684\u5ba2\u6237\u652f\u6301\u5e76\u8fdb\u884c\u5fc5\u8981\u7684\u66f4\u6539\u3002\u6211\u4f1a\u63a8\u8350Bambu\u3002\u6b64\u65f6\uff0c\u6211\u6b63\u5728\u5bfb\u627e\u4e0d\u540c\u7684\u6253\u5370\u673a\u8fdb\u884c\u5907\u4efd\u548c/\u6216\u66f4\u6362\uff0c\u56e0\u4e3a\u652f\u6301\u4e0d\u591f\u3002", "label": "\u8017\u6750\u4f9b\u5e94\u4e0d\u7a33\u5b9a"}, {"week": "W10", "region": "US", "comment_en": "A month to return/fix problems is ridiculous. Refusing to let a customer prove they ordered an item other than the shipping packaging that most people toss immediately is also ridiculous. Your products are great but your customer service makes me hesitant to buy anything from your company again or refer you to others.", "id": 117, "comment_zh": "\u4e00\u4e2a\u6708\u7684\u65f6\u95f4\u6765\u8fd4\u56de/\u89e3\u51b3\u95ee\u9898\u662f\u8352\u8c2c\u7684\u3002\u62d2\u7edd\u8ba9\u987e\u5ba2\u8bc1\u660e\u4ed6\u4eec\u8ba2\u8d2d\u7684\u5546\u54c1\u4e0d\u662f\u5927\u591a\u6570\u4eba\u7acb\u5373\u6254\u6389\u7684\u8fd0\u8f93\u5305\u88c5\uff0c\u8fd9\u4e5f\u662f\u8352\u8c2c\u7684\u3002\u4f60\u4eec\u7684\u4ea7\u54c1\u5f88\u68d2\uff0c\u4f46\u4f60\u4eec\u7684\u5ba2\u6237\u670d\u52a1\u8ba9\u6211\u72b9\u8c6b\u662f\u5426\u518d\u6b21\u4ece\u4f60\u4eec\u516c\u53f8\u8d2d\u4e70\u4efb\u4f55\u4e1c\u897f\u6216\u5c06\u4f60\u4eec\u63a8\u8350\u7ed9\u5176\u4ed6\u4eba\u3002", "label": "\u9000\u6b3e/\u9000\u8d27\u969c\u788d"}, {"week": "W10", "region": "EU", "comment_en": "Hallo", "id": 118, "comment_zh": "\u4f60\u597d", "label": "\u5176\u4ed6"}, {"week": "W10", "region": "US", "comment_en": "I provided all the information and even screenshots because I replaced my old phone which I had no idea i setup the 2FA. After the latest Bambu studio update. it signed me off. now that im trying to sign back on, it prompts me for the2FA code", "id": 119, "comment_zh": "\u6211\u63d0\u4f9b\u4e86\u6240\u6709\u4fe1\u606f\u751a\u81f3\u5c4f\u5e55\u622a\u56fe\uff0c\u56e0\u4e3a\u6211\u66f4\u6362\u4e86\u65e7\u624b\u673a\uff0c\u4f46\u6211\u4e0d\u77e5\u9053\u6211\u8bbe\u7f6e\u4e86 2FA\u3002 Bambu\u5de5\u4f5c\u5ba4\u6700\u65b0\u66f4\u65b0\u540e\u3002\u5b83\u8ba9\u6211\u9000\u51fa\u4e86\u3002\u73b0\u5728\u6211\u5c1d\u8bd5\u91cd\u65b0\u767b\u5f55\uff0c\u5b83\u4f1a\u63d0\u793a\u6211\u8f93\u5165 2FA \u4ee3\u7801", "label": "\u8017\u6750\u4f9b\u5e94\u4e0d\u7a33\u5b9a"}, {"week": "W10", "region": "CA", "comment_en": "Tried to return a purchase that was a gift. The item was never removed from the box. Recipient didn't want a 3D printer, and because I missed the return window, I was denied a return & refund. I ordered to recieve in time for the birthday and didn't realize my return window would be so short. Now I have to figure out a way to sell it on.", "id": 120, "comment_zh": "\u8bd5\u56fe\u9000\u56de\u4f5c\u4e3a\u793c\u7269\u8d2d\u4e70\u7684\u5546\u54c1\u3002\u8be5\u7269\u54c1\u4ece\u672a\u4ece\u76d2\u5b50\u4e2d\u53d6\u51fa\u3002\u6536\u4ef6\u4eba\u4e0d\u60f3\u8981 3D \u6253\u5370\u673a\uff0c\u5e76\u4e14\u7531\u4e8e\u6211\u9519\u8fc7\u4e86\u9000\u8d27\u7a97\u53e3\uff0c\u6211\u88ab\u62d2\u7edd\u9000\u8d27\u548c\u9000\u6b3e\u3002\u6211\u4e0b\u4ee4\u5728\u751f\u65e5\u90a3\u5929\u53ca\u65f6\u6536\u8d27\uff0c\u4f46\u6ca1\u6709\u610f\u8bc6\u5230\u6211\u7684\u9000\u8d27\u7a97\u53e3\u4f1a\u8fd9\u4e48\u77ed\u3002\u73b0\u5728\u6211\u5f97\u60f3\u529e\u6cd5\u628a\u5b83\u5356\u6389\u3002", "label": "\u9000\u6b3e/\u9000\u8d27\u969c\u788d"}, {"week": "W10", "region": "US", "comment_en": "Product is usually great but customer service is the worst my machine still is not fixed", "id": 121, "comment_zh": "\u4ea7\u54c1\u901a\u5e38\u5f88\u68d2\uff0c\u4f46\u5ba2\u6237\u670d\u52a1\u662f\u6700\u5dee\u7684\uff0c\u6211\u7684\u673a\u5668\u4ecd\u7136\u6ca1\u6709\u4fee\u597d", "label": "\u5176\u4ed6"}, {"week": "W10", "region": "US", "comment_en": "My original ticket with a defect on the printer was put on hold because the accessories was shipped in a different box and a different carrier. The accessories was labeled undeliverable and sent back. I had to wait for this to be delivered and resolved before they would send me a new printer. I don't understand why one had to be completed before they would move forward with the other. I have been waiting 2 weeks for a new printer replacement and get that taken care of. I think that is poor", "id": 122, "comment_zh": "\u6211\u7684\u539f\u59cb\u7968\u636e\u5728\u6253\u5370\u673a\u4e0a\u6709\u7f3a\u9677\uff0c\u56e0\u6b64\u88ab\u6401\u7f6e\uff0c\u56e0\u4e3a\u914d\u4ef6\u662f\u88c5\u5728\u4e0d\u540c\u7684\u76d2\u5b50\u548c\u4e0d\u540c\u7684\u627f\u8fd0\u5546\u4e2d\u8fd0\u8f93\u7684\u3002\u914d\u4ef6\u88ab\u6807\u8bb0\u4e3a\u65e0\u6cd5\u6295\u9012\u5e76\u88ab\u9000\u56de\u3002\u6211\u5fc5\u987b\u7b49\u5f85\u8fd9\u4e2a\u95ee\u9898\u4ea4\u4ed8\u5e76\u89e3\u51b3\uff0c\u7136\u540e\u4ed6\u4eec\u624d\u4f1a\u7ed9\u6211\u53d1\u9001\u4e00\u53f0\u65b0\u6253\u5370\u673a\u3002\u6211\u4e0d\u660e\u767d\u4e3a\u4ec0\u4e48\u5fc5\u987b\u5148\u5b8c\u6210\u4e00\u4e2a\u4efb\u52a1\u624d\u80fd\u7ee7\u7eed\u53e6\u4e00\u4e2a\u4efb\u52a1\u3002\u6211\u5df2\u7ecf\u7b49\u4e86\u4e24\u5468\u624d\u66f4\u6362\u65b0\u6253\u5370\u673a\u5e76\u5f97\u5230\u89e3\u51b3\u3002\u6211\u8ba4\u4e3a\u8fd9\u5f88\u7a77", "label": "\u9000\u6b3e/\u9000\u8d27\u969c\u788d"}, {"week": "W10", "region": "EU", "comment_en": "No product no service delivery and maybe no money", "id": 123, "comment_zh": "\u6ca1\u6709\u4ea7\u54c1\u5c31\u6ca1\u6709\u670d\u52a1\uff0c\u4e5f\u8bb8\u8fd8\u6ca1\u6709\u94b1", "label": "\u5176\u4ed6"}, {"week": "W10", "region": "EU", "comment_en": "Packet wurde angeblich an mich pers\u00f6nlich zugestellt. Es     '<div class="stat"><div class="n">'+Object.keys(regions).length+'</div><div class="l">&#28041;&#21450;&#22320;&#21306;</div></div>' +
    '<div class="stat"><div class="n" style="font-size:14px;color:#2980b9">'+escHtml(topLabel)+'</div><div class="l">&#26368;&#22810;&#38382;&#39064; ('+topCount+'&#26465;)</div></div>' +
    '<div class="stat"><div class="n" style="font-size:18px;color:#e67e22">'+editCount+'</div><div class="l">&#24050;&#25163;&#21160;&#20462;&#25913;</div></div>';
}

function renderTable(data) {
  filtered = data;
  var tbody = document.getElementById('tbody');
  var noData = document.getElementById('noData');
  document.getElementById('tblInfo').textContent = '&#26174;&#31034; '+data.length+' &#26465; / &#20849; '+DATA.length+' &#26465;';
  renderStats(data);
  if (!data.length) { tbody.innerHTML=''; noData.style.display='block'; return; }
  noData.style.display='none';
  var html = '';
  data.forEach(function(r) {
    var isEdited = editedIds[r.id] !== undefined;
    html += '<tr data-id="'+r.id+'">' +
      '<td style="text-align:center;font-weight:bold">'+r.id+'</td>' +
      '<td><span class="week-tag">'+escHtml(r.week)+'</span></td>' +
      '<td><span class="region-tag '+getRegionClass(r.region)+'">'+escHtml(r.region)+'</span></td>' +
      '<td><span class="label-tag'+(isEdited?' edited':'')+'" onclick="openLabelEdit(event,'+r.id+')" title="&#28857;&#20987;&#20462;&#25913;&#31867;&#22411;">'+escHtml(r.label)+'</span></td>' +
      '<td class="en-cell">'+escHtml(r.comment_en)+'</td>' +
      '<td class="zh-cell">'+escHtml(r.comment_zh)+'</td>' +
      '</tr>';
  });
  tbody.innerHTML = html;
}

function filterTable() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var week   = document.getElementById('filterWeek').value;
  var region = document.getElementById('filterRegion').value;
  var label  = document.getElementById('filterLabel').value;
  var result = DATA.filter(function(r) {
    if (week   && r.week   !== week)   return false;
    if (region && r.region !== region) return false;
    if (label  && r.label  !== label)  return false;
    if (search && r.comment_en.toLowerCase().indexOf(search) < 0 && r.comment_zh.toLowerCase().indexOf(search) < 0) return false;
    return true;
  });
  renderTable(result);
}

function resetFilters() {
  document.getElementById('searchInput').value='';
  document.getElementById('filterWeek').value='';
  document.getElementById('filterRegion').value='';
  document.getElementById('filterLabel').value='';
  renderTable(DATA);
}

function sortBy(col) {
  if (sortCol===col) sortAsc=!sortAsc; else {sortCol=col;sortAsc=true;}
  var keys=['id','week','region','label'];
  var sorted=filtered.slice().sort(function(a,b){
    var va=String(a[keys[col]]), vb=String(b[keys[col]]);
    return sortAsc ? va.localeCompare(vb,'zh') : vb.localeCompare(va,'zh');
  });
  renderTable(sorted);
}

function openLabelEdit(evt, rowId) {
  evt.stopPropagation();
  currentEditId = rowId;
  var row = DATA.find(function(r){ return r.id === rowId; });
  var dd = document.getElementById('labelDropdown');
  document.getElementById('ddSearch').value = '';
  renderDropdownList(row ? row.label : '');
  var rect = evt.target.getBoundingClientRect();
  var top  = rect.bottom + window.scrollY + 4;
  var left = rect.left   + window.scrollX;
  if (left + 210 > window.innerWidth) left = window.innerWidth - 220;
  dd.style.top  = top  + 'px';
  dd.style.left = left + 'px';
  dd.style.display = 'block';
  document.getElementById('ddSearch').focus();
}

function renderDropdownList(currentLabel) {
  var search = document.getElementById('ddSearch').value.toLowerCase();
  var list = ALL_LABELS.filter(function(l){ return !search || l.indexOf(search) >= 0; });
  var html = '';
  list.forEach(function(l) {
    var active = (l === currentLabel) ? ' active' : '';
    html += '<div class="dd-item'+active+'" onclick="selectLabel(this.dataset.val)" data-val="'+escHtml(l)+'">'+escHtml(l)+'</div>';
  });
  document.getElementById('ddList').innerHTML = html || '<div class="dd-item" style="color:#aaa">&#26080;&#21305;&#37197;</div>';
}

function filterDropdown() {
  var row = DATA.find(function(r){ return r.id === currentEditId; });
  renderDropdownList(row ? row.label : '');
}

function selectLabel(newLabel) {
  if (currentEditId === null) return;
  var row = DATA.find(function(r){ return r.id === currentEditId; });
  if (!row) return;
  if (row.label === newLabel) { closeDropdown(); return; }
  row.label = newLabel;
  editedIds[row.id] = newLabel;
  saveEdits();
  updateEditUI();
  closeDropdown();
  filterTable();
  renderMatrix();
}

function clearAllEdits() {
  if (!confirm('&#30830;&#35748;&#28165;&#38500;&#25152;&#26377;&#25163;&#21160;&#20462;&#25913;&#65311;&#25152;&#26377;&#26631;&#31614;&#23558;&#24674;&#22797;&#20026;&#33258;&#21160;&#20998;&#31867;&#32467;&#26524;&#12290;')) return;
  editedIds = {};
  saveEdits();
  // Restore original auto labels from ORIG_DATA
  DATA.forEach(function(r) { r.label = ORIG_DATA[r.id - 1].label; });
  updateEditUI();
  filterTable();
  renderMatrix();
}

function updateEditUI() {
  var count = Object.keys(editedIds).length;
  var hasEdits = count > 0;
  document.getElementById('editedCsvBtn').style.display = hasEdits ? '' : 'none';
  document.getElementById('clearEditsBtn').style.display = hasEdits ? '' : 'none';
  document.getElementById('editNotice').style.display = hasEdits ? '' : 'none';
}

function closeDropdown() {
  document.getElementById('labelDropdown').style.display = 'none';
  currentEditId = null;
}

document.addEventListener('click', function(e) {
  var dd = document.getElementById('labelDropdown');
  if (dd.style.display === 'block' && !dd.contains(e.target)) closeDropdown();
});

function toCSV(data) {
  var hdrs = ['&#24207;&#21495;','&#21608;&#27425;','&#22320;&#21306;','&#38382;&#39064;&#31867;&#22411;','&#33521;&#25991;&#21407;&#25991;','&#20013;&#25991;&#32763;&#35793;'];
  var lines = [hdrs.map(function(h){ return '"'+h+'"'; }).join(',')];
  data.forEach(function(r) {
    lines.push([r.id, r.week, r.region, r.label, r.comment_en, r.comment_zh]
      .map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }).join(','));
  });
  return '\uFEFF' + lines.join('\r\n');
}

function downloadCSV(onlyFiltered) {
  var data = onlyFiltered ? filtered : DATA;
  var blob = new Blob([toCSV(data)], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = onlyFiltered ? 'DTC&#24046;&#35780;_&#31579;&#36873;&#32467;&#26524;.csv' : 'DTC&#24046;&#35780;_&#20840;&#37096;&#25968;&#25454;.csv';
  a.click();
}

function downloadEditedCSV() {
  var blob = new Blob([toCSV(DATA)], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'DTC&#24046;&#35780;_&#21547;&#25163;&#21160;&#20462;&#25913;.csv';
  a.click();
}

function heatClass(pct) {
  if (pct === 0)  return 'cell-0';
  if (pct < 0.05) return 'heat-1';
  if (pct < 0.1)  return 'heat-2';
  if (pct < 0.2)  return 'heat-3';
  if (pct < 0.35) return 'heat-4';
  return 'heat-5';
}

function renderMatrix() {
  var selRegion = document.getElementById('tab2Region').value;
  var matrix = {}, totals = {};
  DATA.forEach(function(r) {
    if (selRegion && r.region !== selRegion) return;
    matrix[r.region] = matrix[r.region] || {};
    matrix[r.region][r.label] = (matrix[r.region][r.label] || 0) + 1;
    totals[r.region] = (totals[r.region] || 0) + 1;
  });
  var activeRegions = selRegion ? [selRegion] : ALL_REGIONS.filter(function(reg){ return matrix[reg]; });
  var activeLabels  = ALL_LABELS.filter(function(lbl){
    return activeRegions.some(function(reg){ return (matrix[reg]||{})[lbl]; });
  });
  var html = '<tr><th>&#22320;&#21306; \ &#38382;&#39064;&#31867;&#22411;</th>';
  activeLabels.forEach(function(lbl){
    html += '<th title="'+escHtml(lbl)+'">'+(lbl.length>8?lbl.slice(0,8)+'&#8230;':lbl)+'</th>';
  });
  html += '<th>&#21512;&#35745;</th></tr>';
  var colTotals = {}, grandTotal = 0;
  activeRegions.forEach(function(reg) {
    if (!matrix[reg]) return;
    var tot = totals[reg] || 1;
    grandTotal += tot;
    html += '<tr><td>'+escHtml(reg)+'</td>';
    activeLabels.forEach(function(lbl) {
      var n = (matrix[reg]||{})[lbl] || 0;
      colTotals[lbl] = (colTotals[lbl]||0) + n;
      var pct = n / tot;
      var cls = heatClass(pct);
      var pctStr = n > 0 ? '<span class="pct">'+(pct*100).toFixed(1)+'%</span>' : '';
      html += '<td class="'+cls+'">'+(n>0?n:'')+pctStr+'</td>';
    });
    html += '<td style="font-weight:bold;background:#f1f5f9">'+tot+'</td></tr>';
  });
  html += '<tr><td>&#21512;&#35745;</td>';
  activeLabels.forEach(function(lbl){ html += '<td>'+(colTotals[lbl]||'')+'</td>'; });
  html += '<td>'+grandTotal+'</td></tr>';
  document.getElementById('matrixTable').innerHTML = html;
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

initSelects();
updateEditUI();
renderTable(DATA);
renderMatrix();
</script>
</body>
